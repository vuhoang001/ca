name: CD - PUBLISH

on:
  workflow_run:
    workflows: [ "CI - BUILD" ]
    types: [ completed ]
    branches: [ main, develop ]

concurrency:
  group: cd-publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/auth-system

jobs:
  build-and-publish:
    name: Build and push Docker image
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare tags metadata
        id: vars
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          RUN="${{ github.run_number }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"

          # main-42-abc1234
          echo "build_tag=${BRANCH}-${RUN}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.build_tag }}

            type=raw,value=latest,enable=${{ steps.vars.outputs.branch == 'main' }}
            type=raw,value=staging,enable=${{ steps.vars.outputs.branch == 'develop' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max