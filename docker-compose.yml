services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auth-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - auth-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P Your_password123 -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  auth-api:
    build:
      context: .
      dockerfile: Auth.Api/Dockerfile
    container_name: auth-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: Server=sqlserver,1433;Database=authdb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: auth-service
      Jwt__Audience: auth-clients
      Jwt__SigningKey: compose-signing-key-change-before-production
      Seed__AdminEmail: admin@local.dev
      Seed__AdminUserName: admin
      Seed__AdminPassword: Admin@123456
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  auth-sqlserver-data:
