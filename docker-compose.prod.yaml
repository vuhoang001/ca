version: "3.9"

# Mọi giá trị nhạy cảm đọc từ file .env (được tạo trên server bởi CD pipeline)
# Không hardcode password hay secret ở đây

networks:
  app-network:
    driver: bridge

volumes:
  mssql-data:
  mssql-backup:

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: myapp-mssql-prod
    restart: always
    networks: [ app-network ]
    # KHÔNG expose port ra ngoài — chỉ api container mới truy cập được
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Standard"
    volumes:
      - mssql-data:/var/opt/mssql
      - mssql-backup:/var/opt/mssql/backup
    healthcheck:
      test: [
        "CMD", "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}",
        "-Q", "SELECT 1", "-C"
      ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g

  api:
    image: ghcr.io/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: myapp-api-prod
    restart: always
    networks: [ app-network ]
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: >-
        Server=mssql,1433;Database=${DB_NAME};User Id=sa;
        Password=${DB_PASSWORD};TrustServerCertificate=True;
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first  # Zero-downtime: start instance mới trước, dừng cũ sau
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m